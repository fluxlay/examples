schemaVersion: 1
name: Type Pulse
slug: type-pulse
version: 0.1.0
kind: web
permissions:
  - keyboard
description: |
  タイピングするたび、無地の紙のようなデスクトップに細い波紋が広がって消えるライブ壁紙。打鍵の「タイミング」だけを使い、押したキーは一切記録しないプライバシー設計。入力が速いほど波紋は密に大きく重なり、手を止めれば静かな無地に戻ります。

  重なった波紋は干渉模様を描き、アイドル時は描画ループを止めて CPU をほとんど消費しません。Paper / Ink の2テーマに対応し、波紋の色・寿命・サイズ・紙グレインの有無を自由にカスタマイズできます。

  特徴:
  - 打鍵に反応する円形波紋 — キーコードは読まず、発生位置はキーと無関係な乱数。キーリピートは無視
  - 軽量・常駐前提 — 波紋がゼロのときは描画ループを停止。4K / Retina でもバンディングなし
  - カスタマイズ — テーマ(Paper / Ink)、波紋の色、寿命(1〜5秒)、サイズ、紙グレインの有無

properties:
  theme:
    type: select
    label: Theme
    default: paper
    options:
      - value: paper
        label: Paper (light)
      - value: ink
        label: Ink (dark)
  followThemeColor:
    type: boolean
    label: Ripple Color Follows Theme
    default: true
  rippleColor:
    type: color
    label: Ripple Color (when not following theme)
    default: "#2a2a2a"
  rippleLifetime:
    type: number
    label: Ripple Lifetime (seconds)
    default: 2.5
    min: 1
    max: 5
    step: 0.1
  rippleSize:
    type: number
    label: Ripple Size
    default: 1
    min: 0.5
    max: 2
    step: 0.1
  paperGrain:
    type: boolean
    label: Paper Grain
    default: true
