description: |
  The simplest Fluxlay wallpaper — a minimal starting point for building your own. Displays a centered "Hello World!!" message on a clean gray background.
  
  Perfect as a boilerplate template to quickly scaffold new wallpaper projects. Includes the essential Fluxlay project structure with React, TypeScript, and Vite pre-configured.
