schemaVersion: 1
name: Monochrome Time Art
slug: monochrome-time-art
version: 0.2.0
kind: web
description: |
  白黒ミニマルなアート系タイポグラフィ時計の壁紙。スイス風の左寄せレイアウトで時刻を大胆に配置し、毎分ごとにアニメーションとフォントが自動で切り替わる、おしゃれで芸術的なデスクトップ壁紙です。同じ表情を二度と繰り返さず、白黒の余白美を楽しめます。

permissions: []

network:
  - origin: https://fonts.googleapis.com
    reason: Load the rotating set of display typefaces (Google Fonts stylesheet).
  - origin: https://fonts.gstatic.com
    reason: Fetch the actual font files referenced by the Google Fonts stylesheet.
  - origin: https://geocoding-api.open-meteo.com
    reason: Resolve the configured city name into coordinates for the weather line.
  - origin: https://api.open-meteo.com
    reason: Fetch the current temperature and conditions for the optional weather line.

properties:
  theme:
    type: select
    label: Theme
    default: dark
    options:
      - value: dark
        label: Dark (white on black)
      - value: light
        label: Light (black on white)
  hourFormat:
    type: select
    label: Hour Format
    default: "24"
    options:
      - value: "24"
        label: 24-hour
      - value: "12"
        label: 12-hour
  showSeconds:
    type: boolean
    label: Show Seconds
    default: false
  showWeather:
    type: boolean
    label: Show Weather
    default: false
  weatherLocation:
    type: text
    label: Weather Location
    default: Tokyo
    placeholder: City name (e.g. Tokyo, London)
  fontMode:
    type: select
    label: Typeface
    default: shuffle
    options:
      - value: shuffle
        label: Shuffle (new font each minute)
      - value: archivo
        label: Archivo Black
      - value: anton
        label: Anton
      - value: bebas
        label: Bebas Neue
      - value: oswald
        label: Oswald
      - value: saira
        label: Saira Condensed
      - value: khand
        label: Khand
      - value: barlow
        label: Barlow Condensed
      - value: inter
        label: Inter
      - value: playfair
        label: Playfair Display
      - value: dmserif
        label: DM Serif Display
      - value: abril
        label: Abril Fatface
  animationMode:
    type: select
    label: Animation
    default: shuffle
    options:
      - value: shuffle
        label: Shuffle (new animation each minute)
      - value: flip
        label: Flip
      - value: slide
        label: Slide
      - value: dissolve
        label: Dissolve
      - value: blur
        label: Blur
      - value: glitch
        label: Glitch
      - value: fall
        label: Fall
      - value: scale
        label: Scale
