schemaVersion: 1
name: Monochrome Time Art
slug: monochrome-time-art
version: 0.1.0
kind: web
description: |
  A bold, monochrome particle clock. The time is drawn as a cloud of dots, and every minute the particles scatter and re-assemble into the new time through a different motion — exploding, swirling, raining, converging — while the polarity flips between black-on-white and white-on-black for a brutalist edge.

  Features:
  - Particle Typography — the time is rendered as a living field of dots
  - Per-Minute Motion — a new scatter/re-form animation each time the minute changes
  - Brutalist Invert — negative/positive polarity flips every minute
  - Rotating Typefaces — cycles through a curated set of expressive Google Fonts
  - Theme Switch — dark or light base
  - Optional Seconds — quiet, subdued seconds readout you can toggle on
  - 12 / 24 Hour — pick your clock format

  Built with React and Canvas 2D, fully within Fluxlay's production CSP.

permissions: []

network:
  - origin: https://fonts.googleapis.com
    reason: Load the rotating set of display typefaces (Google Fonts stylesheet).
  - origin: https://fonts.gstatic.com
    reason: Fetch the actual font files referenced by the Google Fonts stylesheet.

properties:
  theme:
    type: select
    label: Theme
    default: dark
    options:
      - value: dark
        label: Dark (white on black)
      - value: light
        label: Light (black on white)
  hourFormat:
    type: select
    label: Hour Format
    default: "24"
    options:
      - value: "24"
        label: 24-hour
      - value: "12"
        label: 12-hour
  showSeconds:
    type: boolean
    label: Show Seconds
    default: false
  fontMode:
    type: select
    label: Typeface
    default: shuffle
    options:
      - value: shuffle
        label: Shuffle (new font each minute)
      - value: playfair
        label: Playfair Display
      - value: bebas
        label: Bebas Neue
      - value: archivo
        label: Archivo Black
      - value: spacemono
        label: Space Mono
      - value: majormono
        label: Major Mono Display
      - value: oswald
        label: Oswald
      - value: cormorant
        label: Cormorant Garamond
      - value: abril
        label: Abril Fatface
  animationMode:
    type: select
    label: Animation
    default: shuffle
    options:
      - value: shuffle
        label: Shuffle (new motion each minute)
      - value: explode
        label: Explode (burst from center)
      - value: swirl
        label: Swirl
      - value: vortex
        label: Vortex
      - value: rain
        label: Rain (fall from top)
      - value: converge
        label: Converge (in from edges)
      - value: wave
        label: Wave
      - value: scatter
        label: Scatter (random)
