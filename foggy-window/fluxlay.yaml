schemaVersion: 1
name: Foggy Window
slug: foggy-window
version: 0.1.0
kind: web
description: |
  Your Mac becomes a foggy window on a rainy night.
  A distant rain falls over the city while a thin veil of condensation softens
  the view. An ambient, lo-fi inspired live wallpaper for late-night focus
  sessions.

properties:
  condensation:
    type: number
    label: Window Condensation
    default: 0.35
    min: 0
    max: 1
    step: 0.05
  rainIntensity:
    type: number
    label: Rain Intensity
    default: 0.6
    min: 0
    max: 2
    step: 0.1
  cityLightBreath:
    type: number
    label: City Light Breathing
    default: 0.50
    min: 0
    max: 1.2
    step: 0.05
